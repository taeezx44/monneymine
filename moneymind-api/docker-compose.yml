version: '3.9'

services:
  api:
    build: .
    target: build
    command: npm run dev
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:      development
      DATABASE_URL:  postgres://moneymind:secret@postgres:5432/moneymind
      REDIS_URL:     redis://redis:6379
    env_file: .env
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     moneymind
      POSTGRES_PASSWORD: secret
      POSTGRES_DB:       moneymind
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moneymind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
